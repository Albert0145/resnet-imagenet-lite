data:
  train_dir: ./data/imagenet100/train
  val_dir: ./data/imagenet100/val
  image_size: 128
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  type: resnet
  depth: 18

train:
  device: cuda:0
  batch_size: 64

  # 你旧 iter 的 accum 逻辑
  # 如果想尽量沿用旧系统，就设 true
  # 如果想暂时关闭旧 accum，则设 false 并令 accum_steps=1
  use_iter_accum: true
  accum_steps: 1
  accum_size: 64

  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001
  epochs: 30

  early_stop_patience: 10
  monitor: val_acc1
  maximize_monitor: true

  save_dir: ./outputs/res18_baseline